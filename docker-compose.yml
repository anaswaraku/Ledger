services:
  db:
    image: postgres:15-alpine
    container_name: ledger_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ledge_users
      POSTGRES_PASSWORD: ledgeweb
      POSTGRES_DB: ledger
    ports:
      - "5432:5432"
    volumes:
      - ledger_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledge_users -d ledger"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  app:
    build: .
    container_name: ledger_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/code
    working_dir: /code
    networks:
      - default

volumes:
  ledger_pg_data:

networks:
  default:
    name: ledger_network
