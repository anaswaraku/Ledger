<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ledger Home</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #121212;
            color: #ffffff;
        }
        .container {
            text-align: center;
            background: #1e1e1e;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        h1 {
            margin-top: 0;
            margin-bottom: 2rem;
            font-size: 2.5rem;
            background: linear-gradient(90deg, #bb86fc, #3700b3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .options {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
        }
        .btn {
            padding: 0.75rem 2rem;
            font-size: 1.1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        .btn-primary {
            background-color: #bb86fc;
            color: #121212;
        }
        .btn-primary:hover {
            background-color: #d1b1ff;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background-color: transparent;
            color: #bb86fc;
            border: 2px solid #bb86fc;
        }
        .btn-secondary:hover {
            background-color: rgba(187, 134, 252, 0.1);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ledger</h1>
        <div class="options">
            <!-- HTMX calls to the login and register routes -->
            <button class="btn btn-secondary" hx-get="/auth/login" hx-target="body" hx-push-url="true">Login</button>
            <button class="btn btn-primary" hx-get="/auth/register" hx-target="body" hx-push-url="true">Register</button>
        </div>
    </div>
</body>
</html>
