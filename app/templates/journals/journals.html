{% extends "base.html" %}
{% set auth_page = false %}
{% block title %}Journals — Ledger{% endblock %}

{% block content %}
<div class="mb-8 flex items-center justify-between">
    <h2 class="text-2xl font-bold text-gray-900 tracking-tight">Journals</h2>
</div>

<!-- Create Journal Form -->
<div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 mb-8">
    <h3 class="text-lg font-medium text-gray-900 mb-4">Create New Journal</h3>
    <form id="create-journal-form" hx-post="/api/v1/journals/" hx-ext="json-enc"
          hx-target="#journal-list" hx-swap="beforeend" class="space-y-4">
        
        <div>
            <label for="j-name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
            <input type="text" id="j-name" name="name" required
                class="w-full sm:w-96 rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand transition-colors">
        </div>

        <div>
            <label for="j-desc" class="block text-sm font-medium text-gray-700 mb-1">Description <span class="text-gray-400 font-normal">(optional)</span></label>
            <input type="text" id="j-desc" name="description"
                class="w-full sm:w-96 rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand transition-colors">
        </div>

        <button type="submit"
            class="inline-flex justify-center rounded-md bg-brand px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-gray-800 focus:outline-none transition-colors">
            Create Journal
        </button>
    </form>
    <div id="journal-create-msg" class="mt-4 text-sm text-gray-600 font-medium"></div>
</div>

<!-- Journal List -->
<div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
    <div class="px-6 py-5 border-b border-gray-200 bg-gray-50">
        <h3 class="text-lg font-medium text-gray-900 leading-6">Your Journals</h3>
    </div>
    <div id="journal-list"
         hx-get="/api/v1/journals/"
         hx-trigger="load"
         hx-target="#journal-list"
         class="p-6">
        <div class="flex items-center justify-center py-8">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-brand"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Render the journal list after initial load
    document.body.addEventListener("htmx:afterRequest", function (e) {
        const el = e.detail.elt;

        // Initial list load
        if (el && el.id === "journal-list" && e.detail.xhr.status === 200) {
            const journals = JSON.parse(e.detail.xhr.response);
            renderJournalList(journals);
            return;
        }

        // After journal creation
        if (el && el.id === "create-journal-form") {
            const msg = document.getElementById("journal-create-msg");
            if (e.detail.xhr.status === 201) {
                msg.innerHTML = '<span class="text-green-600">Journal created successfully.</span>';
                el.reset();
                // Reload list
                htmx.ajax("GET", "/api/v1/journals/", {target: "#journal-list", swap: "outerHTML"});
            } else {
                try {
                    const detail = JSON.parse(e.detail.xhr.response).detail;
                    msg.innerHTML = `<span class="text-red-600">${detail || "Error creating journal."}</span>`;
                } catch { 
                    msg.innerHTML = '<span class="text-red-600">Error creating journal.</span>'; 
                }
            }
        }
    });

    function renderJournalList(journals) {
        const el = document.getElementById("journal-list");
        if (!journals || journals.length === 0) {
            el.innerHTML = '<div class="text-center py-8 text-gray-500">No journals yet. Create one above to get started.</div>';
            return;
        }
        
        const tableHTML = `
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-300">
                    <thead>
                        <tr>
                            <th scope="col" class="py-3.5 pl-4 pr-3 text-left text-sm font-semibold text-gray-900 sm:pl-0">Name</th>
                            <th scope="col" class="px-3 py-3.5 text-left text-sm font-semibold text-gray-900">Description</th>
                            <th scope="col" class="px-3 py-3.5 text-left text-sm font-semibold text-gray-900">Created</th>
                            <th scope="col" class="relative py-3.5 pl-3 pr-4 sm:pr-0"><span class="sr-only">Actions</span></th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200">
                        ${journals.map(j => `
                        <tr id="journal-row-${j.id}" class="hover:bg-gray-50 transition-colors group">
                            <td class="whitespace-nowrap py-4 pl-4 pr-3 text-sm font-medium text-gray-900 sm:pl-0">
                                <a href="/journals/${j.id}" class="text-brand hover:text-gray-600 underline decoration-gray-300 underline-offset-4">${j.name}</a>
                            </td>
                            <td class="whitespace-nowrap px-3 py-4 text-sm text-gray-500">${j.description || "—"}</td>
                            <td class="whitespace-nowrap px-3 py-4 text-sm text-gray-500">${new Date(j.created_at).toLocaleDateString()}</td>
                            <td class="relative whitespace-nowrap py-4 pl-3 pr-4 text-right text-sm font-medium sm:pr-0">
                                <button
                                    hx-delete="/api/v1/journals/${j.id}"
                                    hx-confirm="Are you sure you want to delete journal '${j.name}'?"
                                    hx-target="#journal-row-${j.id}"
                                    hx-swap="outerHTML"
                                    class="text-red-600 hover:text-red-900 opacity-0 group-hover:opacity-100 transition-opacity focus:opacity-100">
                                    Delete
                                </button>
                            </td>
                        </tr>`).join("")}
                    </tbody>
                </table>
            </div>`;
            
        el.innerHTML = tableHTML;
        htmx.process(el); // ensure HTMX picks up dynamic elements
    }
</script>
{% endblock %}
