<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ledger{% endblock %}</title>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/json-enc.js"></script>
    <!-- Tailwind CSS (Minimal Configuration) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#111827', // text-gray-900
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 text-gray-800 font-sans antialiased flex h-screen overflow-hidden">

    {% if not auth_page %}
    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col h-full shadow-sm">
        <div class="h-16 flex items-center px-6 border-b border-gray-200">
            <strong class="text-xl font-bold tracking-tight text-gray-900"><a href="/dashboard">Ledger</a></strong>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
        <select name="journal-list" id="my-journal" class="block px-4 py-2 text-sm font-medium text-gray-700 rounded-md hover:bg-gray-100 hover:text-gray-900 transition-colors">
            <option value="">Loading...</option>
        </select>
         <p class="block px-4 py-2 text-xs font-medium text-gray-700 rounded-md hover:bg-gray-100 hover:text-gray-700 transition-colors">Overview</p>
            <a href="/accounts" class="block px-4 py-2 text-sm font-medium text-gray-700 rounded-md hover:bg-gray-100 hover:text-gray-900 transition-colors">Accounts</a>
            <a href="/transactions" class="block px-4 py-2 text-sm font-medium text-gray-700 rounded-md hover:bg-gray-100 hover:text-gray-900 transition-colors">Transactions</a>
            <a href="/reports" class="block px-4 py-2 text-sm font-medium text-gray-700 rounded-md hover:bg-gray-100 hover:text-gray-900 transition-colors">Reports</a>
        </nav>
        <div class="p-4 border-t border-gray-200">
            <a href="#" onclick="logout()" class="block px-4 py-2 text-sm font-medium text-red-600 rounded-md hover:bg-red-50 transition-colors">Logout</a>
        </div>
    </aside>
  
    {% endif %}

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col h-full overflow-hidden">
        {% if dashboard_page==true %}
        <header class="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-8 shrink-0">
            <div class="flex items-center space-x-4">
            </div>
            <div class="flex items-center">
                <button hx-get="/journals" hx-target="body" class="p-2 rounded-full text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition-colors focus:outline-none" title="Add New" >
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                </button>
            </div>
        </header>
        {% endif %}

        <main class="flex-1 overflow-y-auto">
            <div class="max-w-5xl mx-auto p-8">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script>
        // Inject JWT into every HTMX request
        document.body.addEventListener("htmx:configRequest", function (e) {
            const token = localStorage.getItem("access_token");
            if (token) {
                e.detail.headers["Authorization"] = "Bearer " + token;
            }
        });

        function logout() {
            localStorage.removeItem("access_token");
            window.location.href = "/";
        }

        // Global HTMX error handler
        document.body.addEventListener("htmx:responseError", function (e) {
            const status = e.detail.xhr.status;
            if (status === 401) {
                localStorage.removeItem("access_token");
                window.location.href = "/auth/login";
            }
        });

    document.addEventListener("DOMContentLoaded",()=>{

        const dropdown= document.getElementById("my-journal");
        const apiEndpoint="/api/v1/journals/";
        const token = localStorage.getItem("access_token");

        fetch(apiEndpoint, {
            headers: {
                'Authorization': 'Bearer ' + token
            }
        }).then(
            response=>{
                if (!response.ok){
                    throw new Error("Network response not ok");
                }
                return response.json();
            }
        ).then((data)=>{
            dropdown.innerHTML='<option value="">Select a journal...</option>';
            let savedJournalId = localStorage.getItem('selectedJournalId');

            if (!savedJournalId && data.length > 0) {
                savedJournalId = data[0].id;
                localStorage.setItem('selectedJournalId', savedJournalId);
                window.location.reload();
                return;
            }

            data.forEach(item => {
                const option=document.createElement("option");
                option.value=item.id;
                option.textContent=item.name;
                if (item.id === savedJournalId) {
                    option.selected = true;
                }
                dropdown.appendChild(option);
            });

            dropdown.addEventListener('change', (e) => {
                if (e.target.value) {
                    localStorage.setItem('selectedJournalId', e.target.value);
                } else {
                    localStorage.removeItem('selectedJournalId');
                }
                window.location.reload();
            });
        }).catch(error=>{
            console.error("error fetching",error);
            dropdown.innerHTML='<option value="">Failed to load</option>'
        })
    })
    </script>

    {% block scripts %}{% endblock %}
</body>

</html>
