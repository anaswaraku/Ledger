<!DOCTYPE html>
<html lang="en">

<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}Ledger{% endblock %}</title>
        <script src="https://unpkg.com/htmx.org@1.9.10"></script>
        <script src="https://unpkg.com/htmx.org/dist/ext/json-enc.js"></script>
</head>

<body>
        <style>
                body {

                        background: #f9fafb;
                        font-family: Inter, sans-serif;
                        margin: 0;
                }

                .container {
                        background: #f7ede2;
                        padding: 3rem;
                        border-radius: 12px;
                        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.864);
                        width: 100%;
                        max-width: 400px;
                }

                .navbar {
                        display: flex;
                        align-items: center;
                        flex-wrap: wrap;
                        gap: 1rem;
                        padding: 1rem 1.5rem;
                        background: #fff;
                        border-bottom: 1px solid #e5e7eb;
                }

                .logo {
                        margin-right: auto;
                        font-size: 1.2rem;
                        font-weight: 700;
                        color: #111827;
                }

                .navbar a {
                        text-decoration: none;
                        color: #4b5563;
                        font-size: 0.95rem;
                        font-weight: 500;
                        transition: color 0.2s;
                }

                .navbar a:hover {
                        color: #111827;
                }

                .navbar a:last-child {
                        color: #dc2626;
                }

                /* Button */
                button {
                        padding: 10px 16px;
                        background-color: #4a90e2;
                        color: #fff;
                        border: none;
                        border-radius: 6px;
                        font-size: 14px;
                        font-weight: 600;
                        cursor: pointer;
                        transition: background-color 0.2s ease, transform 0.1s ease;
                }

                /* Button hover */
                button:hover {
                        background-color: #357abd;
                }

                /* Button click effect */
                button:active {
                        transform: scale(0.97);
                }

                label {
                        font-size: 14px;
                        font-weight: 600;
                        color: #444;
                        display: inline-block;
                        margin-bottom: 4px;
                }

                /* Shared Style for Inputs & Select */
                input,
                select {
                        width: 100%;
                        padding: 10px 12px;
                        font-size: 14px;
                        border-radius: 8px;
                        border: 1px solid #ddd;
                        background: #fff;
                        color: #333;
                        transition: all 0.25s ease;
                        outline: none;
                }

                /* Focus effect (same for both) */
                input:focus,
                select:focus {
                        border-color: #4a90e2;
                        box-shadow: 0 0 6px rgba(74, 144, 226, 0.3);
                }

                /* Hover */
                input:hover,
                select:hover {
                        border-color: #aaa;
                }

                /* Select container */
                .select-container {
                        position: relative;
                }

                /* Remove default arrow */
                select {
                        appearance: none;
                        padding-right: 35px;
                        cursor: pointer;
                }

                /* Custom arrow */
                .select-container::after {
                        content: "⌄";
                        position: absolute;
                        right: 12px;
                        top: 50%;
                        transform: translateY(-50%);
                        font-size: 16px;
                        color: #666;
                        pointer-events: none;
                        transition: 0.3s;
                }

                /* Arrow animation on focus */
                select:focus+.select-container::after,
                .select-container:hover::after {
                        color: #4a90e2;
                }

                /* Mobile */
                @media (max-width: 768px) {
                        .navbar {
                                flex-direction: column;
                                align-items: flex-start;
                                gap: 0.75rem;
                        }

                        .logo {
                                margin-right: 0;
                                margin-bottom: 0.5rem;
                        }

                        .navbar a {
                                width: 100%;
                                padding: 0.25rem 0;
                        }
                }
        </style>



        {% if auth_page==false %}
        <nav class="navbar">

                <strong class="logo">Ledger</strong>
                <a href="/journals">Journals</a>
                <a href="/accounts">Accounts</a>
                <a href="/transactions">Transactions</a>
                <a href="/reports">Reports</a>
                <a href="#" onclick="logout()">Logout</a>


        </nav>
        {% elif dashboard == true %}
        <nav class="navbar">
                <strong class="logo">Ledger</strong>
                <a href="#" onclick="logout()">Logout</a>
        </nav>
        <hr>
        {% endif %}

        <main>
                {% block content %}{% endblock %}
        </main>

        <script>
                // Inject JWT into every HTMX request
                document.body.addEventListener("htmx:configRequest", function (e) {
                        const token = localStorage.getItem("access_token");
                        if (token) {
                                e.detail.headers["Authorization"] = "Bearer " + token;
                        }
                });

                function logout() {
                        localStorage.removeItem("access_token");
                        window.location.href = "/";
                }

                // Global HTMX error handler
                document.body.addEventListener("htmx:responseError", function (e) {
                        const status = e.detail.xhr.status;
                        if (status === 401) {
                                localStorage.removeItem("access_token");
                                window.location.href = "/auth/login";
                        }
                });
        </script>

        {% block scripts %}{% endblock %}
</body>

</html>>
