<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ledger{% endblock %}</title>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/json-enc.js"></script>
    <!-- Tailwind CSS (Minimal Configuration) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#111827', // text-gray-900
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 text-gray-800 font-sans antialiased flex h-screen overflow-hidden">

    {% if not auth_page %}
    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col h-full shadow-sm">
        <div class="h-16 flex items-center px-6 border-b border-gray-200">
            <strong class="text-xl font-bold tracking-tight text-gray-900"><a href="/dashboard">Ledger</a></strong>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
        <select name="journal-list" id="my-journal" class="block px-4 py-2 text-sm font-medium text-gray-700 rounded-md hover:bg-gray-100 hover:text-gray-900 transition-colors">
            <option value="">Loading...</option>
        </select>
            <a href="/journals" class="block px-4 py-2 text-sm font-medium text-gray-700 rounded-md hover:bg-gray-100 hover:text-gray-900 transition-colors">Journals</a>
            <a href="/accounts" class="block px-4 py-2 text-sm font-medium text-gray-700 rounded-md hover:bg-gray-100 hover:text-gray-900 transition-colors">Accounts</a>
            <a href="/transactions" class="block px-4 py-2 text-sm font-medium text-gray-700 rounded-md hover:bg-gray-100 hover:text-gray-900 transition-colors">Transactions</a>
            <a href="/reports" class="block px-4 py-2 text-sm font-medium text-gray-700 rounded-md hover:bg-gray-100 hover:text-gray-900 transition-colors">Reports</a>
        </nav>
        <div class="p-4 border-t border-gray-200">
            <a href="#" onclick="logout()" class="block px-4 py-2 text-sm font-medium text-red-600 rounded-md hover:bg-red-50 transition-colors">Logout</a>
        </div>
    </aside>
  
    {% endif %}

    <!-- Main Content Area -->
    <main class="flex-1 h-full overflow-y-auto">
        <div class="max-w-5xl mx-auto p-8">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script>
        // Inject JWT into every HTMX request
        document.body.addEventListener("htmx:configRequest", function (e) {
            const token = localStorage.getItem("access_token");
            if (token) {
                e.detail.headers["Authorization"] = "Bearer " + token;
            }
        });

        function logout() {
            localStorage.removeItem("access_token");
            window.location.href = "/";
        }

        // Global HTMX error handler
        document.body.addEventListener("htmx:responseError", function (e) {
            const status = e.detail.xhr.status;
            if (status === 401) {
                localStorage.removeItem("access_token");
                window.location.href = "/auth/login";
            }
        });

    document.addEventListener("DOMContentLoaded",()=>{

        const dropdown= document.getElementById("my-journal");
        const apiEndpoint="/api/v1/journals/";

        fetch(apiEndpoint).then(
            response=>{
                if (!response.ok){
                    throw new Error("Network response not ok");
                }
                return response.json();
            }
        ).then((data)=>{
            dropdown.innerHTML='<option value="">Select an option...</option>';

            data.forEach(item => {
                const option=document.createElement("option");
                option.value=item.id;
                option.textContent=item.name;
                dropdown.appendChild(option);
            });
        }).catch(error=>{
            console.error("error fetching",error);
            dropdown.innerHTML='<option value="">Failed to load</option>'
        })
    })
    </script>

    {% block scripts %}{% endblock %}
</body>

</html>
