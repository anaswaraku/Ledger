{% extends "base.html" %}

{% block title %}Reports — Ledger{% endblock %}

{% block content %}
<div class="mb-8 flex items-center justify-between">
    <h2 class="text-2xl font-bold text-gray-900 tracking-tight">Reports</h2>
</div>

<div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 mb-8">
    <div class="account_container">
        <label for="journal-select" class="block text-sm font-medium text-gray-700 mb-1">Journal</label>
        <select id="journal-select" onchange="onJournalChange(this.value)"
            class="w-full sm:w-96 rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand transition-colors bg-white">
            <option value="">-- select journal --</option>
        </select>
    </div>
</div>

<section id="reports-section" style="display:none" class="space-y-6">
    <nav class="flex flex-wrap gap-3">
        <button onclick="loadReport('balance-sheet')" class="px-4 py-2 border border-gray-300 rounded-md bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-brand transition-colors">Balance Sheet</button>
        <button onclick="loadReport('income-statement')" class="px-4 py-2 border border-gray-300 rounded-md bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-brand transition-colors">Income Statement</button>
        <button onclick="loadReport('cash-flow')" class="px-4 py-2 border border-gray-300 rounded-md bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-brand transition-colors">Cash Flow</button>
    </nav>

    <!-- Date range for period reports -->
    <div id="date-range" style="display:none" class="bg-gray-50 p-4 rounded-md border border-gray-200">
        <div class="flex flex-wrap gap-4 items-end">
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">From</label>
                <input type="date" id="report-from" class="rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-brand focus:outline-none">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">To</label>
                <input type="date" id="report-to" class="rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-brand focus:outline-none">
            </div>
            <button onclick="loadReport(currentReport)" class="px-4 py-2 bg-brand text-white text-sm font-medium rounded-md hover:bg-gray-800 transition-colors">Run Report</button>
        </div>
    </div>

    <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
        <div class="px-6 py-5 border-b border-gray-200 bg-gray-50">
            <h3 class="text-lg font-medium text-gray-900 leading-6">Report Output</h3>
        </div>
        <div id="report-output" class="p-6">
            <p class="text-gray-500 text-sm text-center">Select a report above.</p>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
    let selectedJournalId = null;
    let currentReport = null;

    function fetchJson(url, opts = {}) {
        const token = localStorage.getItem("access_token");
        return fetch(url, {
            ...opts,
            headers: {
                "Content-Type": "application/json",
                "Authorization": token ? "Bearer " + token : "",
                ...(opts.headers || {})
            }
        }).then(r => {
            if (r.status === 401) { localStorage.removeItem("access_token"); window.location.href = "/auth/login"; }
            return r.json();
        });
    }

    fetchJson("/api/v1/journals/").then(journals => {
        const sel = document.getElementById("journal-select");
        journals.forEach(j => {
            const opt = document.createElement("option");
            opt.value = j.id;
            opt.textContent = j.name;
            sel.appendChild(opt);
        });
    });

    function onJournalChange(jid) {
        selectedJournalId = jid;
        document.getElementById("reports-section").style.display = jid ? "block" : "none";
        document.getElementById("report-output").innerHTML = "<p class='text-gray-500 text-sm text-center'>Select a report above.</p>";
        currentReport = null;
    }

    function loadReport(name) {
        currentReport = name;
        const output = document.getElementById("report-output");
        output.innerHTML = '<div class="flex items-center justify-center py-8"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-brand"></div></div>';

        const isPeriod = name === "income-statement" || name=="cash-flow";
        document.getElementById("date-range").style.display = isPeriod ? "block" : "none";

        let url = `/api/v1/reports/${name}?journal_id=${selectedJournalId}&currency=USD`;

        if (isPeriod) {
            const from = document.getElementById("report-from").value;
            const to = document.getElementById("report-to").value;
            if (!from || !to) {
                output.innerHTML = "<p class='text-red-600 text-sm'>Please select a date range.</p>";
                return;
            }
            url += `&date_from=${from}&date_to=${to}`;
        }

        fetchJson(url).then(data => {
            if (name === "balance-sheet") renderBalanceSheet(data);
            else if (name === "income-statement") renderIncomeStatement(data);
            else if (name =="cash-flow") renderCashFlow(data);
            else output.innerHTML = "<pre class='bg-gray-100 p-4 rounded text-sm overflow-x-auto'>" + JSON.stringify(data, null, 2) + "</pre>";
        }).catch(() => {
            output.innerHTML = "<p class='text-red-600 text-sm'>Error loading report.</p>";
        });
    }

    function renderBalanceSheet(data) {
        const el = document.getElementById("report-output");
        if (!data || !data.assets) {
            el.innerHTML = "<pre class='bg-gray-100 p-4 rounded text-sm overflow-x-auto'>" + JSON.stringify(data, null, 2) + "</pre>";
            return;
        }
        el.innerHTML = `
            <div class="mb-6 pb-4 border-b border-gray-200">
                <h3 class="text-xl font-bold text-gray-900">Balance Sheet</h3>
                <p class="text-sm text-gray-500">As of ${data.date}</p>
            </div>
            <div class="space-y-8">
                ${renderDictSection("Assets", data.assets)}
                ${renderDictSection("Liabilities", data.liabilities)}
                ${renderDictSection("Equity", data.equity)}
            </div>
            <div class="mt-8 pt-4 border-t-2 border-gray-900 flex justify-between items-center">
                <strong class="text-lg text-gray-900">Net Assets</strong>
                <strong class="text-lg text-gray-900 font-mono">${parseFloat(data.net).toFixed(2)}</strong>
            </div>
        `;
    }

    function renderDictSection(title, dictData) {
        let rows = "";
        let total = 0;
        for (const [name, balance] of Object.entries(dictData)) {
            const val = parseFloat(balance);
            rows += `<tr class="hover:bg-gray-50"><td class="py-2 pl-4 text-sm text-gray-700">${name}</td><td class="py-2 pr-4 text-sm text-gray-900 font-mono text-right">${val.toFixed(2)}</td></tr>`;
            total += val;
        }
        if (!rows) rows = "<tr><td colspan='2' class='py-2 px-4 text-sm text-gray-500 italic'>None</td></tr>";
        
        return `
            <div>
                <h4 class="text-md font-semibold text-gray-800 mb-2">${title}</h4>
                <div class="bg-white border border-gray-200 rounded-md overflow-hidden">
                    <table class="min-w-full divide-y divide-gray-200">
                        <tbody class="divide-y divide-gray-200">
                            ${rows}
                        </tbody>
                        <tfoot class="bg-gray-50 border-t border-gray-200">
                            <tr>
                                <td class="py-3 pl-4 text-sm font-medium text-gray-900">Total ${title}</td>
                                <td class="py-3 pr-4 text-sm font-bold text-gray-900 font-mono text-right">${total.toFixed(2)}</td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>`;
    }

    function renderIncomeStatement(data) {
        const el = document.getElementById("report-output");
        if (!data || !data.income) {
            el.innerHTML = "<pre class='bg-gray-100 p-4 rounded text-sm overflow-x-auto'>" + JSON.stringify(data, null, 2) + "</pre>";
            return;
        }
        el.innerHTML = `
            <div class="mb-6 pb-4 border-b border-gray-200">
                <h3 class="text-xl font-bold text-gray-900">Income Statement</h3>
                <p class="text-sm text-gray-500">Period: ${data.date_from} to ${data.date_to}</p>
            </div>
            <div class="space-y-8">
                ${renderDictSection("Income", data.income)}
                ${renderDictSection("Expenses", data.expenses)}
            </div>
            <div class="mt-8 pt-4 border-t-2 border-gray-900 flex justify-between items-center">
                <strong class="text-lg text-gray-900">Net Income</strong>
                <strong class="text-lg text-gray-900 font-mono ${parseFloat(data.net_income) < 0 ? 'text-red-600' : 'text-green-600'}">${parseFloat(data.net_income).toFixed(2)}</strong>
            </div>
        `;
    }

    function renderCashFlow(data){
        const el = document.getElementById("report-output");
        if (!data || data.beginning_balance ===undefined){
            el.innerHTML="<pre class='bg-gray-100 p-4 rounded text-sm overflow-x-auto'>"+JSON.stringify(data, null, 2)+"</pre>";
            return;
        }
        el.innerHTML=`
        <div class="mb-6 pb-4 border-b border-gray-200">
            <h3 class="text-xl font-bold text-gray-900">Cash Flow Statement</h3>
            <p class="text-sm text-gray-500">Period: ${data.date_from} to ${data.date_to}</p>
        </div>
        
        <div class="flex justify-between items-center mb-6 px-4 py-3 bg-gray-50 rounded-md border border-gray-200">
            <strong class="text-sm text-gray-700">Beginning Cash Balance</strong>
            <strong class="text-sm font-mono text-gray-900">$${parseFloat(data.beginning_balance).toFixed(2)}</strong>
        </div>
        
        <div class="space-y-8 mb-6">
            ${renderDictSection("Cash Inflows", data.inflows)}
            ${renderDictSection("Cash Outflows", data.outflows)}
        </div>
        
        <div class="flex justify-between items-center mb-6 px-4 py-3 border-b border-gray-200">
            <strong class="text-sm text-gray-700">Net Cash Flow</strong>
            <strong class="text-sm font-mono ${parseFloat(data.net_cash_flow) < 0 ? 'text-red-600' : 'text-green-600'}">$${parseFloat(data.net_cash_flow).toFixed(2)}</strong>
        </div>
        
        <div class="flex justify-between items-center pt-2">
            <strong class="text-lg text-gray-900">Ending Cash Balance</strong>
            <strong class="text-lg font-mono text-gray-900">$${parseFloat(data.ending_balance).toFixed(2)}</strong>
        </div>
        `;
    }
</script>
{% endblock %}
