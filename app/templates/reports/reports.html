{% extends "base.html" %}

{% block title %}Reports — Ledger{% endblock %}

{% block content %}
<div class="mb-8 flex items-center justify-between">
    <h2 class="text-2xl font-bold text-gray-900 tracking-tight">Reports</h2>
</div>



<section id="reports-section" style="display:none" class="space-y-6">

    <!-- Date range for period reports -->
    <div id="date-range" style="display:none" class="bg-gray-50 p-4 rounded-md border border-gray-200">
        <div class="flex flex-wrap gap-4 items-end">
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">From</label>
                <input type="date" id="report-from" class="rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-brand focus:outline-none">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">To</label>
                <input type="date" id="report-to" class="rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-brand focus:outline-none">
            </div>
            <button onclick="loadReport(currentReport)" class="px-4 py-2 bg-brand text-white text-sm font-medium rounded-md hover:bg-gray-800 transition-colors">Run Report</button>
        </div>
    </div>

    <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
        <div class="px-6 py-5 border-b border-gray-200 bg-gray-50">
            <h3 class="text-lg font-medium text-gray-900 leading-6">Report Output</h3>
        </div>
        <div id="report-output" class="p-6">
            <p class="text-gray-500 text-sm text-center">Select a report above.</p>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js" charset="utf-8"></script>
<script>
    let selectedJournalId = null;
    let journalBaseCurrency = "USD";

    const currentReport = "{{ report_type }}";

    function fetchJson(url, opts = {}) {
        const token = localStorage.getItem("access_token");
        return fetch(url, {
            ...opts,
            headers: {
                "Content-Type": "application/json",
                "Authorization": token ? "Bearer " + token : "",
                ...(opts.headers || {})
            }
        }).then(r => {
            if (r.status === 401) {
                localStorage.removeItem("access_token");
                window.location.href = "/auth/login";
            }
            return r.json();
        });
    }

    document.addEventListener("DOMContentLoaded", async () => {
        const jid = localStorage.getItem("selectedJournalId");

        if (!jid) {
            const warning = document.createElement("div");
            warning.className = "bg-white rounded-lg shadow-sm border border-gray-200 p-6 mb-8 text-center text-sm text-gray-500";
            warning.textContent = "Please select a journal from the sidebar.";
            document.getElementById("reports-section").parentNode.insertBefore(warning, document.getElementById("reports-section"));
            return;
        }

        selectedJournalId = jid;

        try {
            const journal = await fetchJson(`/api/v1/journals/${jid}`);
            if (journal && journal.base_currency) {
                journalBaseCurrency = journal.base_currency;
            }
        } catch (err) {
            console.error("Error fetching journal base currency", err);
        }

        document.getElementById("reports-section").style.display = "block";

        const isPeriod = currentReport === "income-statement" || currentReport === "cash-flow";
        document.getElementById("date-range").style.display = isPeriod ? "block" : "none";

        if (isPeriod) {
            const today = new Date();
            const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
            const fmt = (d) => {
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                return `${y}-${m}-${dd}`;
            };
            document.getElementById("report-from").value = fmt(firstDay);
            document.getElementById("report-to").value = fmt(today);
        }

        loadReport(currentReport);
    });

    function loadReport(name) {
        const output = document.getElementById("report-output");
        output.innerHTML = '<div class="flex items-center justify-center py-8"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-brand"></div></div>';

        const isPeriod = name === "income-statement" || name === "cash-flow";
        let url = `/api/v1/reports/${name}?journal_id=${selectedJournalId}`;

        if (isPeriod) {
            const from = document.getElementById("report-from").value;
            const to = document.getElementById("report-to").value;
            if (!from || !to) {
                output.innerHTML = "<p class='text-red-600 text-sm'>Please select a date range.</p>";
                return;
            }
            url += `&date_from=${from}&date_to=${to}`;
        }

        fetchJson(url)
            .then(data => {
                if (data && data.detail) { renderErrorBox(data.detail); return; }
                if (name === "balance-sheet")      renderBalanceSheet(data);
                else if (name === "income-statement") renderIncomeStatement(data);
                else if (name === "cash-flow")     renderCashFlow(data);
                else if (name === "roi")           renderRoiReport(data);
                else output.innerHTML = "<pre class='bg-gray-100 p-4 rounded text-sm overflow-x-auto'>" + JSON.stringify(data, null, 2) + "</pre>";
            })
            .catch(() => {
                output.innerHTML = "<p class='text-red-600 text-sm'>Error loading report.</p>";
            });
    }

    function renderErrorBox(detail) {
        const el = document.getElementById("report-output");
        let message = "An unknown error occurred.";
        let missingRatesHtml = "";

        if (typeof detail === "string") {
            message = detail;
        } else if (typeof detail === "object") {
            message = detail.message || JSON.stringify(detail);
            if (detail.missing_rates && detail.missing_rates.length > 0) {
                missingRatesHtml = `
                    <div class="mt-4">
                        <p class="text-sm font-medium text-red-800 mb-2">Please add the following exchange rates to generate this report:</p>
                        <ul class="list-disc pl-5 space-y-1">
                            ${detail.missing_rates.map(rate =>
                                `<li class="text-sm text-red-700"><strong>${rate.from} &rarr; ${rate.to}</strong> on ${rate.date} (blocks ${rate.transaction_count} transaction entries)</li>`
                            ).join("")}
                        </ul>
                    </div>`;
            }
        }

        el.innerHTML = `
            <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded-md my-4">
                <div class="flex">
                    <div class="flex-shrink-0 mt-0.5">
                        <svg class="h-5 w-5 text-red-400" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                        </svg>
                    </div>
                    <div class="ml-3">
                        <h3 class="text-sm font-medium text-red-800">Calculation Error</h3>
                        <div class="mt-2 text-sm text-red-700"><p>${message}</p></div>
                        ${missingRatesHtml}
                    </div>
                </div>
            </div>`;
    }

    function renderBalanceSheet(data) {
        const el = document.getElementById("report-output");
        if (!data || !data.assets) {
            el.innerHTML = "<pre class='bg-gray-100 p-4 rounded text-sm overflow-x-auto'>" + JSON.stringify(data, null, 2) + "</pre>";
            return;
        }
        el.innerHTML = `
            <div class="mb-6 pb-4 border-b border-gray-200">
                <h3 class="text-xl font-bold text-gray-900">Balance Sheet</h3>
                <p class="text-sm text-gray-500">As of ${data.date}</p>
            </div>
            <div class="space-y-8">
                ${renderDictSection("Assets", data.assets)}
                ${renderDictSection("Liabilities", data.liabilities)}
                ${renderDictSection("Equity", data.equity)}
            </div>
            <div class="mt-8 pt-4 border-t-2 border-gray-900 flex justify-between items-center">
                <strong class="text-lg text-gray-900">Net Assets</strong>
                <strong class="text-lg text-gray-900 font-mono">${journalBaseCurrency} ${parseFloat(data.net).toFixed(2)}</strong>
            </div>`;
    }

    function renderDictSection(title, dictData) {
        let rows = "";
        let total = 0;
        for (const [name, balance] of Object.entries(dictData)) {
            const val = parseFloat(balance);
            rows += `<tr class="hover:bg-gray-50">
                <td class="py-2 pl-4 text-sm text-gray-700">${name}</td>
                <td class="py-2 pr-4 text-sm text-gray-900 font-mono text-right">${journalBaseCurrency} ${val.toFixed(2)}</td>
            </tr>`;
            total += val;
        }
        if (!rows) rows = "<tr><td colspan='2' class='py-2 px-4 text-sm text-gray-500 italic'>None</td></tr>";
        return `
            <div>
                <h4 class="text-md font-semibold text-gray-800 mb-2">${title}</h4>
                <div class="bg-white border border-gray-200 rounded-md overflow-hidden">
                    <table class="min-w-full divide-y divide-gray-200">
                        <tbody class="divide-y divide-gray-200">${rows}</tbody>
                        <tfoot class="bg-gray-50 border-t border-gray-200">
                            <tr>
                                <td class="py-3 pl-4 text-sm font-medium text-gray-900">Total ${title}</td>
                                <td class="py-3 pr-4 text-sm font-bold text-gray-900 font-mono text-right">${journalBaseCurrency} ${total.toFixed(2)}</td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>`;
    }

    function renderIncomeStatement(data) {
        const el = document.getElementById("report-output");
        if (!data || !data.income) {
            el.innerHTML = "<pre class='bg-gray-100 p-4 rounded text-sm overflow-x-auto'>" + JSON.stringify(data, null, 2) + "</pre>";
            return;
        }
        el.innerHTML = `
            <div class="mb-6 pb-4 border-b border-gray-200">
                <h3 class="text-xl font-bold text-gray-900">Income Statement</h3>
                <p class="text-sm text-gray-500">Period: ${data.date_from} to ${data.date_to}</p>
            </div>
            <div class="space-y-8">
                ${renderDictSection("Income", data.income)}
                ${renderDictSection("Expenses", data.expenses)}
            </div>
            <div class="mt-8 pt-4 border-t-2 border-gray-900 flex justify-between items-center">
                <strong class="text-lg text-gray-900">Net Income</strong>
                <strong class="text-lg text-gray-900 font-mono ${parseFloat(data.net_income) < 0 ? 'text-red-600' : 'text-green-600'}">
                    ${journalBaseCurrency} ${parseFloat(data.net_income).toFixed(2)}
                </strong>
            </div>`;
    }

    function renderCashFlow(data) {
        const el = document.getElementById("report-output");
        if (!data || data.beginning_balance === undefined) {
            el.innerHTML = "<pre class='bg-gray-100 p-4 rounded text-sm overflow-x-auto'>" + JSON.stringify(data, null, 2) + "</pre>";
            return;
        }
        el.innerHTML = `
            <div class="mb-6 pb-4 border-b border-gray-200">
                <h3 class="text-xl font-bold text-gray-900">Cash Flow Statement</h3>
                <p class="text-sm text-gray-500">Period: ${data.date_from} to ${data.date_to}</p>
            </div>
            <div class="flex justify-between items-center mb-6 px-4 py-3 bg-gray-50 rounded-md border border-gray-200">
                <strong>Beginning Cash Balance</strong>
                <strong>${journalBaseCurrency} ${parseFloat(data.beginning_balance).toFixed(2)}</strong>
            </div>
            <div class="space-y-8 mb-6">
                ${renderDictSection("Cash Inflows", data.inflows)}
                ${renderDictSection("Cash Outflows", data.outflows)}
            </div>
            <div class="flex justify-between items-center mb-6 px-4 py-3 border-b border-gray-200">
                <strong>Net Cash Flow</strong>
                <strong class="${parseFloat(data.net_cash_flow) < 0 ? 'text-red-600' : 'text-green-600'}">
                    ${journalBaseCurrency} ${parseFloat(data.net_cash_flow).toFixed(2)}
                </strong>
            </div>
            <div class="flex justify-between items-center pt-2">
                <strong class="text-lg">Ending Cash Balance</strong>
                <strong class="text-lg font-mono">${journalBaseCurrency} ${parseFloat(data.ending_balance).toFixed(2)}</strong>
            </div>`;
    }

    function renderRoiReport(data) {
        const el = document.getElementById("report-output");

        if (!data || !data.assets) {
            el.innerHTML = "<pre class='bg-gray-100 p-4 rounded text-sm overflow-x-auto'>" + JSON.stringify(data, null, 2) + "</pre>";
            return;
        }

        // ── Missing rates warning ──────────────────────────────────────────
        let warningHtml = "";
        if (data.is_complete === false && data.missing_rates && data.missing_rates.length > 0) {
            warningHtml = `
                <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-md mb-6 shadow-sm">
                    <div class="flex items-start">
                        <div class="flex-shrink-0">
                            <svg class="h-5 w-5 text-yellow-500" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
                            </svg>
                        </div>
                        <div class="ml-3">
                            <h3 class="text-sm font-bold text-yellow-800">Partial Valuation (Missing Exchange Rates)</h3>
                            <div class="mt-1 text-sm text-yellow-700">
                                <p>Some assets are hidden because the following exchange rates to your base currency are missing:</p>
                                <ul class="list-disc pl-5 mt-2 space-y-1">
                                    ${data.missing_rates.map(r => `<li><strong>${r.from} &rarr; ${r.to}</strong> on ${r.date}</li>`).join('')}
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        // ── Table rows ─────────────────────────────────────────────────────
        let rows = data.assets.map(a => {
            const gainVal = parseFloat(a.gain);
            const roiVal  = parseFloat(a.roi_percent);
            const isPos   = gainVal >= 0;
            const cls     = isPos ? "text-green-600" : "text-red-600";
            const sign    = isPos ? '+' : '-';
            return `
                <tr class="hover:bg-gray-50">
                    <td class="py-3 px-4 text-sm font-medium text-gray-900">${a.account_name}</td>
                    <td class="py-3 px-4 text-sm text-gray-500">${parseFloat(a.quantity).toFixed(4)} ${a.commodity}</td>
                    <td class="py-3 px-4 text-sm text-gray-900 font-mono text-right">${a.cost_commodity} ${parseFloat(a.cost_basis).toFixed(2)}</td>
                    <td class="py-3 px-4 text-sm text-gray-900 font-mono text-right">${a.cost_commodity} ${parseFloat(a.current_value).toFixed(2)}</td>
                    <td class="py-3 px-4 text-sm font-mono text-right font-bold ${cls}">${sign}${Math.abs(gainVal).toFixed(2)}</td>
                    <td class="py-3 px-4 text-sm font-mono text-right font-bold ${cls}">${sign}${Math.abs(roiVal).toFixed(2)}%</td>
                </tr>`;
        }).join("");

        if (!rows) {
            rows = "<tr><td colspan='6' class='py-8 px-4 text-sm text-gray-500 text-center italic'>No active investments found.</td></tr>";
        }

        // ── Chart containers (only when there is data) ─────────────────────
        const chartsHtml = data.assets.length > 0 ? `
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-4">
                    <h4 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Cost Basis vs Current Value</h4>
                    <div id="roi-value-chart" style="height:300px;"></div>
                </div>
                <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-4">
                    <h4 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">ROI % by Account</h4>
                    <div id="roi-pct-chart" style="height:300px;"></div>
                </div>
            </div>` : '';

        el.innerHTML = `
            <div class="mb-6 pb-4 border-b border-gray-200">
                <h3 class="text-xl font-bold text-gray-900 tracking-tight">Return on Investment (ROI)</h3>
                <p class="text-sm text-gray-500 mt-1">As of ${data.date}</p>
            </div>

            ${warningHtml}
            ${chartsHtml}

            <div class="bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Account</th>
                                <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Asset Holdings</th>
                                <th class="px-4 py-3 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">Cost Basis</th>
                                <th class="px-4 py-3 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">Current Value</th>
                                <th class="px-4 py-3 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">Gain / Loss</th>
                                <th class="px-4 py-3 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">ROI %</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-200 bg-white">${rows}</tbody>
                    </table>
                </div>
            </div>`;

        // ── Plotly charts (called after innerHTML is set so divs exist) ────
        if (data.assets.length > 0) {
            const names     = data.assets.map(a => a.account_name);
            const costBasis = data.assets.map(a => parseFloat(a.cost_basis));
            const curValues = data.assets.map(a => parseFloat(a.current_value));
            const roiPcts   = data.assets.map(a => parseFloat(a.roi_percent));

            // Chart 1 — Cost Basis vs Current Value (grouped bar)
            Plotly.newPlot('roi-value-chart', [
                {
                    type: 'bar', name: 'Cost Basis',
                    x: names, y: costBasis,
                    marker: { color: '#6366f1', opacity: 0.85 },
                    hovertemplate: '<b>%{x}</b><br>Cost Basis: %{y:,.2f}<extra></extra>',
                },
                {
                    type: 'bar', name: 'Current Value',
                    x: names, y: curValues,
                    marker: { color: '#10b981', opacity: 0.85 },
                    hovertemplate: '<b>%{x}</b><br>Current Value: %{y:,.2f}<extra></extra>',
                }
            ], {
                barmode: 'group',
                margin: { t: 10, r: 10, b: 80, l: 60 },
                paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
                font: { family: 'Inter, sans-serif', size: 11, color: '#374151' },
                xaxis: { tickangle: -30, automargin: true, gridcolor: '#f3f4f6', linecolor: '#e5e7eb' },
                yaxis: { title: journalBaseCurrency, gridcolor: '#f3f4f6', linecolor: '#e5e7eb' },
                legend: { orientation: 'h', y: -0.25 },
                bargap: 0.25,
            }, { responsive: true, displayModeBar: false });

            // Chart 2 — ROI % per account (green = gain, red = loss)
            Plotly.newPlot('roi-pct-chart', [{
                type: 'bar',
                x: names, y: roiPcts,
                marker: {
                    color: roiPcts.map(v => v >= 0 ? '#10b981' : '#ef4444'),
                    opacity: 0.88,
                },
                hovertemplate: '<b>%{x}</b><br>ROI: %{y:+.2f}%<extra></extra>',
                text: roiPcts.map(v => (v >= 0 ? '+' : '') + v.toFixed(1) + '%'),
                textposition: 'outside',
                textfont: { size: 11 },
            }], {
                margin: { t: 30, r: 10, b: 80, l: 50 },
                paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
                font: { family: 'Inter, sans-serif', size: 11, color: '#374151' },
                xaxis: { tickangle: -30, automargin: true, gridcolor: '#f3f4f6', linecolor: '#e5e7eb' },
                yaxis: {
                    title: 'ROI %',
                    gridcolor: '#f3f4f6', linecolor: '#e5e7eb',
                    zeroline: true, zerolinecolor: '#9ca3af', zerolinewidth: 1.5,
                },
                bargap: 0.35,
            }, { responsive: true, displayModeBar: false });

            // ── Chart 3: Dual-Axis — Investment Timeline vs Exchange Rate ─────
            // Build unique commodity pairs from this report's assets
            const pairs = [...new Map(
                data.assets.map(a => [`${a.commodity}/${a.cost_commodity}`, a])
            ).values()];

            if (pairs.length > 0) {
                // Inject UI for the dual-axis section below the existing charts
                const timelineSection = document.createElement('div');
                timelineSection.className = 'mt-8';
                timelineSection.innerHTML = `
                    <div class="flex items-center justify-between mb-4">
                        <div>
                            <h4 class="text-base font-semibold text-gray-900">Investment Timeline vs Exchange Rate</h4>
                            <p class="text-xs text-gray-400 mt-0.5">
                                Bars = cumulative cost basis &amp; net return &nbsp;·&nbsp;
                                Line = exchange rate (right axis)
                            </p>
                        </div>
                        <select id="timeline-pair-select"
                            class="rounded-lg border border-gray-300 px-3 py-1.5 text-sm text-gray-700 bg-white focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-400 shadow-sm">
                            ${pairs.map(a =>
                                `<option value="${a.commodity}|${a.cost_commodity}">${a.commodity} → ${a.cost_commodity}</option>`
                            ).join('')}
                        </select>
                    </div>
                    <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-4">
                        <div id="roi-timeline-chart" style="height:360px;"></div>
                    </div>`;

                document.getElementById('report-output').appendChild(timelineSection);

                // Load chart for the first pair immediately
                loadTimelineChart(pairs[0].commodity, pairs[0].cost_commodity);

                document.getElementById('timeline-pair-select').addEventListener('change', (e) => {
                    const [c, cc] = e.target.value.split('|');
                    loadTimelineChart(c, cc);
                });
            }
        }
    }

    async function loadTimelineChart(commodity, costCommodity) {
        const chartEl = document.getElementById('roi-timeline-chart');
        if (!chartEl) return;

        chartEl.innerHTML = '<div class="flex items-center justify-center h-full"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-500"></div></div>';

        try {
            const token = localStorage.getItem('access_token');
            const url = `/api/v1/reports/roi-timeline?journal_id=${selectedJournalId}&commodity=${commodity}&cost_commodity=${costCommodity}`;
            const res = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });

            if (res.status === 401) { window.location.href = '/auth/login'; return; }
            const data = await res.json();

            if (!data.timeline || data.timeline.length === 0) {
                chartEl.innerHTML = '<p class="text-sm text-gray-400 text-center mt-16">No timeline data available for this pair.</p>';
                return;
            }

            chartEl.innerHTML = '';

            const months     = data.timeline.map(d => d.month);
            const cumCost    = data.timeline.map(d => d.cum_cost);
            const netReturn  = data.timeline.map(d => d.net_return);
            const fxRate     = data.timeline.map(d => d.exchange_rate);

            const palette = { cost: '#6366f1', gain: '#10b981', loss: '#ef4444', fx: '#f59e0b' };
            const netColors = netReturn.map(v => v === null ? '#9ca3af' : (v >= 0 ? palette.gain : palette.loss));

            const traces = [
                // Bar 1 — Cumulative Cost Basis
                {
                    type: 'bar',
                    name: `Cost Basis (${costCommodity})`,
                    x: months,
                    y: cumCost,
                    marker: { color: palette.cost, opacity: 0.80 },
                    yaxis: 'y',
                    hovertemplate: '<b>%{x}</b><br>Cumulative Cost: %{y:,.2f} ' + costCommodity + '<extra></extra>',
                },
                // Bar 2 — Net Return (gain/loss)
                {
                    type: 'bar',
                    name: `Net Return (${costCommodity})`,
                    x: months,
                    y: netReturn,
                    marker: { color: netColors, opacity: 0.85 },
                    yaxis: 'y',
                    hovertemplate: '<b>%{x}</b><br>Net Return: %{y:+,.2f} ' + costCommodity + '<extra></extra>',
                },
                // Line — Exchange Rate
                {
                    type: 'scatter',
                    mode: 'lines+markers',
                    name: `Rate (${commodity}/${costCommodity})`,
                    x: months,
                    y: fxRate,
                    line: { color: palette.fx, width: 2.5, dash: 'solid' },
                    marker: { size: 5, color: palette.fx },
                    yaxis: 'y2',
                    hovertemplate: '<b>%{x}</b><br>Rate: %{y:,.4f}<extra></extra>',
                    connectgaps: true,
                },
            ];

            const layout = {
                barmode: 'overlay',
                margin: { t: 20, r: 70, b: 70, l: 70 },
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor:  'rgba(0,0,0,0)',
                font: { family: 'Inter, sans-serif', size: 11, color: '#374151' },
                legend: { orientation: 'h', y: -0.2 },
                bargap: 0.3,
                xaxis: {
                    type: 'category',
                    tickangle: -35,
                    automargin: true,
                    gridcolor: '#f3f4f6',
                    linecolor: '#e5e7eb',
                },
                yaxis: {
                    title: { text: costCommodity, standoff: 8 },
                    gridcolor: '#f3f4f6',
                    linecolor: '#e5e7eb',
                    zeroline: true,
                    zerolinecolor: '#d1d5db',
                },
                yaxis2: {
                    title: { text: `Rate (${commodity}/${costCommodity})`, standoff: 8 },
                    overlaying: 'y',
                    side: 'right',
                    showgrid: false,
                    linecolor: '#f59e0b',
                    tickfont: { color: '#f59e0b' },
                    titlefont: { color: '#f59e0b' },
                    zeroline: false,
                },
            };

            Plotly.newPlot('roi-timeline-chart', traces, layout, { responsive: true, displayModeBar: false });

        } catch (err) {
            console.error(err);
            chartEl.innerHTML = '<p class="text-sm text-red-500 text-center mt-16">Error loading timeline chart.</p>';
        }
    }
</script>
{% endblock %}
