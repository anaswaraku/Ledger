{% extends "base.html" %}

{% block title %}Transactions — Ledger{% endblock %}

{% block content %}
<div class="mb-8 flex items-center justify-between">
    <h2 class="text-2xl font-bold text-gray-900 tracking-tight">Transactions</h2>
</div>



<section id="txn-section" style="display:none" class="space-y-8">

    <!-- New Transaction Form -->
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
        <h3 class="text-lg font-medium text-gray-900 mb-4">New Transaction</h3>
        <form id="create-txn-form" class="space-y-6">
            
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
                <div>
                    <label for="txn-date" class="block text-sm font-medium text-gray-700 mb-1">Date</label>
                    <input type="date" id="txn-date" name="date" required
                        class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand transition-colors">
                </div>

                <div>
                    <label for="txn-payee" class="block text-sm font-medium text-gray-700 mb-1">Payee</label>
                    <input type="text" id="txn-payee" name="payee" placeholder="e.g. Acme Corp"
                        class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand transition-colors">
                </div>

                <div>
                    <label for="txn-desc" class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                    <input type="text" id="txn-desc" name="description" placeholder="Optional details"
                        class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand transition-colors">
                </div>
            </div>

            <div class="border-t border-gray-200 pt-6">
                <div class="flex items-center justify-between mb-4">
                    <strong class="text-sm font-medium text-gray-900">Entries</strong>
                    <span class="text-xs text-gray-500 bg-gray-100 px-2 py-1 rounded">amounts must sum to 0</span>
                </div>
                
                <div id="entries-container" class="space-y-3">
                    <!-- Entry 1 -->
                    <div class="entry-row flex flex-col sm:flex-row gap-3 items-start sm:items-center">
                        <select name="account_id[]" class="entry-account flex-grow w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand bg-white" required>
                            <option value="">-- account --</option>
                        </select>
                        <input type="number" step="0.01" name="amount[]" placeholder="amount (+ or -)" required
                            class="w-full sm:w-32 rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand">
                        <input type="text" name="currency[]" value="USD" maxlength="3" size="5"
                            class="w-full sm:w-20 rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand text-center uppercase">
                        <div class="w-8"></div> <!-- spacer to align with rows that have delete button -->
                    </div>
                    <!-- Entry 2 -->
                    <div class="entry-row flex flex-col sm:flex-row gap-3 items-start sm:items-center">
                        <select name="account_id[]" class="entry-account flex-grow w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand bg-white" required>
                            <option value="">-- account --</option>
                        </select>
                        <input type="number" step="0.01" name="amount[]" placeholder="amount (+ or -)" required
                            class="w-full sm:w-32 rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand">
                        <input type="text" name="currency[]" value="USD" maxlength="3" size="5"
                            class="w-full sm:w-20 rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand text-center uppercase">
                        <div class="w-8"></div> <!-- spacer -->
                    </div>
                </div>
                
                <div class="mt-4 flex justify-between items-center">
                    <button type="button" onclick="addEntryRow()"
                        class="inline-flex items-center text-sm font-medium text-brand hover:text-gray-600 transition-colors">
                        <svg class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        Add Entry
                    </button>
                    
                    <button type="submit"
                        class="inline-flex justify-center rounded-md bg-brand px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-gray-800 focus:outline-none transition-colors">
                        Post Transaction
                    </button>
                </div>
            </div>
        </form>
        <div id="txn-msg" class="mt-4 text-sm font-medium"></div>
    </div>

    <!-- Transaction History -->
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
        <div class="px-6 py-5 border-b border-gray-200 bg-gray-50 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <h3 class="text-lg font-medium text-gray-900 leading-6">Transaction History</h3>
        </div>
        
        <div id="txn-list" class="p-0">
            <div class="p-6 text-center text-sm text-gray-500">Select a journal to load transactions.</div>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
    let selectedJournalId = null;
    let allAccounts = [];

    function fetchJson(url, opts = {}) {
        const token = localStorage.getItem("access_token");
        return fetch(url, {
            ...opts,
            headers: {
                "Content-Type": "application/json",
                "Authorization": token ? "Bearer " + token : "",
                ...(opts.headers || {})
            }
        }).then(r => {
            if (r.status === 401) { localStorage.removeItem("access_token"); window.location.href = "/auth/login"; }
            return r.json();
        });
    }

    document.addEventListener("DOMContentLoaded", () => {
        const jid = localStorage.getItem("selectedJournalId");
        if (jid) {
            selectedJournalId = jid;
            document.getElementById("txn-section").style.display = "block";
            
            const listEl = document.getElementById("txn-list");
            listEl.innerHTML = '<div class="flex items-center justify-center py-8"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-brand"></div></div>';
            
            fetchJson("/api/v1/accounts/?journal_id=" + jid).then(accounts => {
                allAccounts = accounts;
                populateAccountSelects();
                loadTransactions();
            });
        } else {
            const listEl = document.getElementById("txn-list");
            listEl.innerHTML = '<div class="p-6 text-center text-sm text-gray-500">Please select a journal from the sidebar.</div>';
        }
    });

    function populateAccountSelects() {
        document.querySelectorAll(".entry-account").forEach(sel => {
            const cur = sel.value;
            sel.innerHTML = '<option value="">-- account --</option>' +
                allAccounts.map(a =>
                    `<option value="${a.id}" ${a.id === cur ? "selected" : ""}>${a.name} (${a.account_type})</option>`
                ).join("");
        });
    }

    function addEntryRow() {
        const container = document.getElementById("entries-container");
        const row = document.createElement("div");
        row.className = "entry-row flex flex-col sm:flex-row gap-3 items-start sm:items-center";
        row.innerHTML =
            `<select name="account_id[]" class="entry-account flex-grow w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand bg-white" required>
                <option value="">-- account --</option>
                ${allAccounts.map(a => `<option value="${a.id}">${a.name} (${a.account_type})</option>`).join("")}
            </select>
            <input type="number" step="0.01" name="amount[]" placeholder="amount" required
                class="w-full sm:w-32 rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand">
            <input type="text" name="currency[]" value="USD" maxlength="3" size="5"
                class="w-full sm:w-20 rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand text-center uppercase">
            <button type="button" onclick="this.parentElement.remove()" class="w-8 h-8 inline-flex items-center justify-center text-gray-400 hover:text-red-500 rounded-full hover:bg-red-50 transition-colors">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>`;
        container.appendChild(row);
    }

    // Submit new transaction
    document.getElementById("create-txn-form").addEventListener("submit", function (e) {
        e.preventDefault();
        const msg = document.getElementById("txn-msg");
        msg.innerHTML = '<span class="text-gray-500 text-sm">Posting...</span>';
        
        const accountIds = [...document.querySelectorAll('[name="account_id[]"]')].map(s => s.value);
        const amounts = [...document.querySelectorAll('[name="amount[]"]')].map(i => i.value);
        const currencies = [...document.querySelectorAll('[name="currency[]"]')].map(i => i.value.toUpperCase());

        const entries = accountIds.map((id, idx) => ({
            account_id: id,
            amount: amounts[idx],
            currency: currencies[idx] || "USD",
        }));

        const body = {
            journal_id: selectedJournalId,
            date: document.getElementById("txn-date").value,
            payee: document.getElementById("txn-payee").value || null,
            description: document.getElementById("txn-desc").value || null,
            entries,
        };

        fetchJson("/api/v1/transactions/", { method: "POST", body: JSON.stringify(body) }).then(data => {
            if (data.id) {
                msg.innerHTML = `<span class="text-green-600">Transaction posted successfully.</span>`;
                e.target.reset();
                populateAccountSelects();
                
                // Show loading immediately
                const listEl = document.getElementById("txn-list");
                listEl.innerHTML = '<div class="flex items-center justify-center py-8"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-brand"></div></div>';
                
                loadTransactions();
            } else {
                // Show validation detail
                if (Array.isArray(data.detail)) {
                    msg.innerHTML = `<span class="text-red-600">${data.detail.map(d => d.msg).join("; ")}</span>`;
                } else {
                    msg.innerHTML = `<span class="text-red-600">${data.detail || JSON.stringify(data)}</span>`;
                }
            }
        });
    });

    function loadTransactions() {
        const listEl = document.getElementById("txn-list");
        if (listEl.innerHTML.indexOf("animate-spin") === -1 && listEl.innerHTML.trim() !== "") {
            // Keep existing height but show loading state overlay if we're filtering
             listEl.innerHTML = '<div class="flex items-center justify-center py-8"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-brand"></div></div>';
        }
        
        const params = new URLSearchParams(window.location.search);
        const payee = params.get('payee');
        
        let url = "/api/v1/transactions/?journal_id=" + selectedJournalId;
        if (payee) url += "&payee=" + encodeURIComponent(payee);
        
        fetchJson(url).then(renderTransactions);
    }

    function renderTransactions(txns) {
        const el = document.getElementById("txn-list");
        if (txns.length === 0) { 
            el.innerHTML = "<div class='p-6 text-center text-sm text-gray-500'>No transactions found.</div>"; 
            return; 
        }
        
        const tableHTML = `
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-300">
                    <thead>
                        <tr>
                            <th scope="col" class="py-3.5 pl-6 pr-3 text-left text-sm font-semibold text-gray-900">Date</th>
                            <th scope="col" class="px-3 py-3.5 text-left text-sm font-semibold text-gray-900">Payee</th>
                            <th scope="col" class="px-3 py-3.5 text-left text-sm font-semibold text-gray-900">Description</th>
                            <th scope="col" class="px-3 py-3.5 text-left text-sm font-semibold text-gray-900">Entries</th>
                            <th scope="col" class="relative py-3.5 pl-3 pr-6"><span class="sr-only">Actions</span></th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200 bg-white">
                        ${txns.map(t => `
                        <tr id="txn-row-${t.id}" class="hover:bg-gray-50 transition-colors group">
                            <td class="whitespace-nowrap py-4 pl-6 pr-3 text-sm text-gray-900">${t.date}</td>
                            <td class="whitespace-nowrap px-3 py-4 text-sm font-medium text-gray-900">${t.payee || "—"}</td>
                            <td class="whitespace-nowrap px-3 py-4 text-sm text-gray-500 max-w-xs truncate" title="${t.description || ""}">${t.description || "—"}</td>
                            <td class="px-3 py-4 text-sm text-gray-500">
                                <ul class="space-y-1">
                                ${t.entries.map(en => {
                                    const acc = allAccounts.find(a => a.id === en.account_id);
                                    const name = acc ? acc.name : 'Unknown';
                                    const isPositive = parseFloat(en.amount) > 0;
                                    const amountClass = isPositive ? 'text-green-700' : 'text-gray-900';
                                    return `<li class="flex justify-between items-center gap-4">
                                                <span>${name}</span>
                                                <span class="font-mono text-xs ${amountClass}">${en.amount} ${en.currency}</span>
                                            </li>`;
                                }).join("")}
                                </ul>
                            </td>
                            <td class="relative whitespace-nowrap py-4 pl-3 pr-6 text-right text-sm font-medium">
                                <button onclick="deleteTransaction('${t.id}')"
                                    class="text-red-600 hover:text-red-900 opacity-0 group-hover:opacity-100 transition-opacity focus:opacity-100">
                                    Delete
                                </button>
                            </td>
                        </tr>`).join("")}
                    </tbody>
                </table>
            </div>`;
        el.innerHTML = tableHTML;
    }

    function deleteTransaction(txnId) {
        if (!confirm("Are you sure you want to delete this transaction?")) return;
        const token = localStorage.getItem("access_token");
        fetch("/api/v1/transactions/" + txnId + "?journal_id=" + selectedJournalId, {
            method: "DELETE",
            headers: { "Authorization": "Bearer " + token }
        }).then(r => {
            if (r.status === 204) {
                document.getElementById("txn-row-" + txnId)?.remove();
            } else {
                alert("Error deleting transaction.");
            }
        });
    }
</script>
{% endblock %}
