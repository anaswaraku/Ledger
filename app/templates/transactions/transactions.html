{% extends "base.html" %}

{% block title %}Transactions — Ledger{% endblock %}

{% block content %}
<h2>Transactions</h2>
<style>
    /* General section layout */
#txn-section {
    max-width: 900px;
    margin: 20px auto;
    font-family: Arial, sans-serif;
}

/* Headings */
#txn-section h3 {
    margin-bottom: 10px;
}

/* Form spacing */
#create-txn-form {
    margin-bottom: 20px;
}

/* Labels */
#create-txn-form label {
    display: inline-block;
    margin-bottom: 4px;
    font-weight: 600;
}

/* Inputs */
#create-txn-form input,
#create-txn-form select {
    padding: 6px 8px;
    font-size: 14px;
    margin-bottom: 10px;
    width: 100%;
    box-sizing: border-box;
}

/* Entry rows layout */
.entry-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

/* Entry fields sizing */
.entry-row select {
    flex: 2;
}

.entry-row input[type="number"] {
    flex: 1;
}

.entry-row input[type="text"] {
    flex: 1;
}

/* Buttons */
button {
    padding: 6px 12px;
    margin-right: 10px;
    cursor: pointer;
}

/* Filter section */
#txn-section > div > label {
    margin-right: 15px;
}

/* Transaction list */
#txn-list {
    margin-top: 10px;
}

/* Responsive adjustments */
@media (max-width: 600px) {
    .entry-row {
        flex-direction: column;
    }

    #txn-section > div > label {
        display: block;
        margin-bottom: 8px;
    }
}

</style>
<div class="select-container">
    <label for="journal-select">Journal: </label>
    <select id="journal-select" onchange="onJournalChange(this.value)">
        <option value="">-- select journal --</option>
    </select>
</div>

<hr>

<section id="txn-section" style="display:none">

    <h3>New Transaction</h3>
    <form id="create-txn-form">
        <label for="txn-date">Date</label><br>
        <input type="date" id="txn-date" name="date" required><br><br>

        <label for="txn-payee">Payee</label><br>
        <input type="text" id="txn-payee" name="payee"><br><br>

        <label for="txn-desc">Description</label><br>
        <input type="text" id="txn-desc" name="description"><br><br>

        <strong>Entries</strong> <small>(amounts must sum to 0)</small>
        <div id="entries-container">
            <div class="entry-row">
                <select name="account_id[]" class="entry-account" required>
                    <option value="">-- account --</option>
                </select>
                <input type="number" step="0.01" name="amount[]" placeholder="amount (+ or -)" required>
                <input type="text" name="currency[]" value="USD" maxlength="3" size="5">
            </div>
            <div class="entry-row">
                <select name="account_id[]" class="entry-account" required>
                    <option value="">-- account --</option>
                </select>
                <input type="number" step="0.01" name="amount[]" placeholder="amount (+ or -)" required>
                <input type="text" name="currency[]" value="USD" maxlength="3" size="5">
            </div>
        </div>
        <button type="button" onclick="addEntryRow()">+ Add Entry</button>
        <br><br>
        <button type="submit">Post Transaction</button>
    </form>
    <div id="txn-msg"></div>

    <hr>

    <h3>Transaction History</h3>
    <div>
        <label>Payee: <input type="text" id="filter-payee" size="15"></label>
        <label>From: <input type="date" id="filter-from"></label>
        <label>To: <input type="date" id="filter-to"></label>
        <button onclick="loadTransactions()">Filter</button>
        <button onclick="clearFilters()">Clear</button>
    </div>
    <br>
    <div id="txn-list">
        <p>Select a journal to load transactions.</p>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
    let selectedJournalId = null;
    let allAccounts = [];

    function fetchJson(url, opts = {}) {
        const token = localStorage.getItem("access_token");
        return fetch(url, {
            ...opts,
            headers: {
                "Content-Type": "application/json",
                "Authorization": token ? "Bearer " + token : "",
                ...(opts.headers || {})
            }
        }).then(r => {
            if (r.status === 401) { localStorage.removeItem("access_token"); window.location.href = "/auth/login"; }
            return r.json();
        });
    }

    // Populate journal selector
    fetchJson("/api/v1/journals/").then(journals => {
        const sel = document.getElementById("journal-select");
        journals.forEach(j => {
            const opt = document.createElement("option");
            opt.value = j.id;
            opt.textContent = j.name;
            sel.appendChild(opt);
        });
    });

    function onJournalChange(jid) {
        selectedJournalId = jid;
        if (!jid) { document.getElementById("txn-section").style.display = "none"; return; }
        document.getElementById("txn-section").style.display = "block";
        // Load accounts for this journal
        fetchJson("/api/v1/accounts/?journal_id=" + jid).then(accounts => {
            allAccounts = accounts;
            populateAccountSelects();
            loadTransactions();
        });
    }

    function populateAccountSelects() {
        document.querySelectorAll(".entry-account").forEach(sel => {
            const cur = sel.value;
            sel.innerHTML = '<option value="">-- account --</option>' +
                allAccounts.map(a =>
                    `<option value="${a.id}" ${a.id === cur ? "selected" : ""}>${a.name} (${a.account_type})</option>`
                ).join("");
        });
    }

    function addEntryRow() {
        const container = document.getElementById("entries-container");
        const row = document.createElement("div");
        row.className = "entry-row";
        row.innerHTML =
            `<select name="account_id[]" class="entry-account" required>
                <option value="">-- account --</option>
                ${allAccounts.map(a => `<option value="${a.id}">${a.name} (${a.account_type})</option>`).join("")}
            </select>
            <input type="number" step="0.01" name="amount[]" placeholder="amount" required>
            <input type="text" name="currency[]" value="USD" maxlength="3" size="5">
            <button type="button" onclick="this.parentElement.remove()">✕</button>`;
        container.appendChild(row);
    }

    // Submit new transaction
    document.getElementById("create-txn-form").addEventListener("submit", function (e) {
        e.preventDefault();
        const msg = document.getElementById("txn-msg");
        const accountIds = [...document.querySelectorAll('[name="account_id[]"]')].map(s => s.value);
        const amounts = [...document.querySelectorAll('[name="amount[]"]')].map(i => i.value);
        const currencies = [...document.querySelectorAll('[name="currency[]"]')].map(i => i.value.toUpperCase());

        const entries = accountIds.map((id, idx) => ({
            account_id: id,
            amount: amounts[idx],
            currency: currencies[idx] || "USD",
        }));

        const body = {
            journal_id: selectedJournalId,
            date: document.getElementById("txn-date").value,
            payee: document.getElementById("txn-payee").value || null,
            description: document.getElementById("txn-desc").value || null,
            entries,
        };

        fetchJson("/api/v1/transactions/", { method: "POST", body: JSON.stringify(body) }).then(data => {
            if (data.id) {
                msg.innerText = "Transaction posted (" + data.id + ").";
                e.target.reset();
                populateAccountSelects();
                loadTransactions();
            } else {
                // Show validation detail
                if (Array.isArray(data.detail)) {
                    msg.innerText = data.detail.map(d => d.msg).join("; ");
                } else {
                    msg.innerText = data.detail || JSON.stringify(data);
                }
            }
        });
    });

    function loadTransactions() {
        const payee = document.getElementById("filter-payee").value;
        const from = document.getElementById("filter-from").value;
        const to = document.getElementById("filter-to").value;
        let url = "/api/v1/transactions/?journal_id=" + selectedJournalId;
        if (payee) url += "&payee=" + encodeURIComponent(payee);
        if (from) url += "&date_from=" + from;
        if (to) url += "&date_to=" + to;
        fetchJson(url).then(renderTransactions);
    }

    function clearFilters() {
        document.getElementById("filter-payee").value = "";
        document.getElementById("filter-from").value = "";
        document.getElementById("filter-to").value = "";
        loadTransactions();
    }

    function renderTransactions(txns) {
        const el = document.getElementById("txn-list");
        if (txns.length === 0) { el.innerHTML = "<p>No transactions found.</p>"; return; }
        el.innerHTML = "<table border='1'><thead><tr><th>Date</th><th>Payee</th><th>Description</th><th>Entries</th><th></th></tr></thead><tbody>" +
            txns.map(t => `
                <tr id="txn-row-${t.id}">
                    <td>${t.date}</td>
                    <td>${t.payee || "—"}</td>
                    <td>${t.description || "—"}</td>
                    <td>${t.entries.map(en => {
                const acc = allAccounts.find(a => a.id === en.account_id);
                return `${acc ? acc.name : en.account_id}: ${en.amount} ${en.currency}`;
            }).join("<br>")}</td>
                    <td><button onclick="deleteTransaction('${t.id}')">Delete</button></td>
                </tr>`
            ).join("") + "</tbody></table>";
    }

    function deleteTransaction(txnId) {
        if (!confirm("Delete this transaction?")) return;
        const token = localStorage.getItem("access_token");
        fetch("/api/v1/transactions/" + txnId + "?journal_id=" + selectedJournalId, {
            method: "DELETE",
            headers: { "Authorization": "Bearer " + token }
        }).then(r => {
            if (r.status === 204) {
                document.getElementById("txn-row-" + txnId)?.remove();
            } else {
                alert("Error deleting transaction.");
            }
        });
    }
</script>
{% endblock %}
