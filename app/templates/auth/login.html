{% extends "base.html" %}
{% set auth_page = true %}

{% block title %}Login — Ledger{% endblock %}

{% block content %}
<style>
    body {

        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
</style>
<div class="container">
    <h2>Login</h2>
    <form id="login-form" hx-post="/api/v1/auth/login" hx-ext="json-enc" hx-swap="none">
        <label for="email">Email</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="password">Password</label><br>
        <input type="password" id="password" name="password" required><br><br>

        <button type="submit">Login</button>
    </form>
    <div id="login-msg"></div>
    <br>
    <a href="/auth/register">Don't have an account? Register</a> |
    <a href="/">Back to Home</a>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.body.addEventListener("htmx:afterRequest", function (e) {
        if (e.detail.elt.id !== "login-form") return;
        const msg = document.getElementById("login-msg");
        if (e.detail.xhr.status === 200) {
            const data = JSON.parse(e.detail.xhr.response);
            localStorage.setItem("access_token", data.access_token);
            msg.innerText = "Login successful! Redirecting...";
            setTimeout(() => window.location.href = "/dashboard", 800);
        } else {
            try {
                msg.innerText = JSON.parse(e.detail.xhr.response).detail || "Login failed.";
            } catch {
                msg.innerText = "Login failed.";
            }
        }
    });
</script>
{% endblock %}
