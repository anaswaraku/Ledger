<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ledger - Login</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/json-enc.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #121212;
            color: #ffffff;
        }
        .container {
            text-align: center;
            background: #1e1e1e;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            margin-top: 0;
            margin-bottom: 2rem;
            font-size: 2rem;
            background: linear-gradient(90deg, #bb86fc, #3700b3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            text-align: left;
        }
        .input-group label {
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #ccc;
        }
        .input-group input {
            padding: 0.75rem;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #2c2c2c;
            color: #fff;
            font-size: 1rem;
        }
        .input-group input:focus {
            outline: none;
            border-color: #bb86fc;
        }
        .btn {
            padding: 0.75rem;
            font-size: 1.1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            background-color: #bb86fc;
            color: #121212;
            margin-top: 1rem;
        }
        .btn:hover {
            background-color: #d1b1ff;
            transform: translateY(-2px);
        }
        #error-msg {
            color: #cf6679;
            margin-top: 1rem;
            font-size: 0.9rem;
            min-height: 1.2em;
        }
        .back-link {
            display: block;
            margin-top: 1.5rem;
            color: #bb86fc;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Login</h2>
        <form hx-post="/api/v1/auth/login" hx-ext="json-enc" id="login-form">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn">Login</button>
            <div id="error-msg"></div>
        </form>
        <a href="/" class="back-link">Back to Home</a>
    </div>

    <script>
        document.body.addEventListener("htmx:afterRequest", function(event) {
            if (event.detail.elt.id === "login-form") {
                const errorMsgDiv = document.getElementById("error-msg");
                if (event.detail.xhr.status === 200) {
                    const response = JSON.parse(event.detail.xhr.response);
                    localStorage.setItem("access_token", response.access_token);
                    errorMsgDiv.style.color = "#03dac6";
                    errorMsgDiv.innerText = "Login successful! Redirecting...";
                    setTimeout(() => {
                        window.location.href = "/dashboard";
                    }, 1000);
                } else {
                    try {
                        const errorResponse = JSON.parse(event.detail.xhr.response);
                        errorMsgDiv.innerText = errorResponse.detail || "An error occurred during login.";
                    } catch (e) {
                        errorMsgDiv.innerText = "An error occurred during login.";
                    }
                }
            }
        });
    </script>
</body>
</html>
