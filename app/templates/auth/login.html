{% extends "base.html" %}
{% set auth_page = true %}

{% block title %}Login — Ledger{% endblock %}

{% block content %}
<style>/* Labels */
label {
    font-size: 14px;
    font-weight: 600;
    color: #444;
    display: inline-block;
    margin-bottom: 4px;
}

/* Inputs */
input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
    transition: border 0.2s ease, box-shadow 0.2s ease;
}

/* Input focus effect */
input:focus {
    border-color: #4a90e2;
    outline: none;
    box-shadow: 0 0 4px rgba(74, 144, 226, 0.4);
}

/* Button */
button {
    padding: 10px 16px;
    background-color: #4a90e2;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.2s ease, transform 0.1s ease;
}

/* Button hover */
button:hover {
    background-color: #357abd;
}

/* Button click effect */
button:active {
    transform: scale(0.97);
}</style>
<h2>Login</h2>
<form id="login-form" hx-post="/api/v1/auth/login" hx-ext="json-enc" hx-swap="none">
    <label for="email">Email</label><br>
    <input type="email" id="email" name="email" required><br><br>

    <label for="password">Password</label><br>
    <input type="password" id="password" name="password" required><br><br>

    <button type="submit">Login</button>
</form>
<div id="login-msg"></div>
<br>
<a href="/auth/register">Don't have an account? Register</a> |
<a href="/">Back to Home</a>
{% endblock %}

{% block scripts %}
<script>
    document.body.addEventListener("htmx:afterRequest", function (e) {
        if (e.detail.elt.id !== "login-form") return;
        const msg = document.getElementById("login-msg");
        if (e.detail.xhr.status === 200) {
            const data = JSON.parse(e.detail.xhr.response);
            localStorage.setItem("access_token", data.access_token);
            msg.innerText = "Login successful! Redirecting...";
            setTimeout(() => window.location.href = "/dashboard", 800);
        } else {
            try {
                msg.innerText = JSON.parse(e.detail.xhr.response).detail || "Login failed.";
            } catch {
                msg.innerText = "Login failed.";
            }
        }
    });
</script>
{% endblock %}
