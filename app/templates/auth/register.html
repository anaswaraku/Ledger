{% extends "base.html" %}
{% set auth_page = true %}

{% block title %}Register — Ledger{% endblock %}

{% block content %}
<h2>Register</h2>
<form id="register-form" hx-post="/api/v1/auth/register" hx-ext="json-enc">
    <label for="email">Email</label><br>
    <input type="email" id="email" name="email" required><br><br>

    <label for="password">Password</label><br>
    <input type="password" id="password" name="password" required><br><br>

    <button type="submit">Register</button>
</form>
<div id="register-msg"></div>
<br>
<a href="/auth/login">Already have an account? Login</a> |
<a href="/">Back to Home</a>
{% endblock %}

{% block scripts %}
<script>
    document.body.addEventListener("htmx:afterRequest", function (e) {
        if (e.detail.elt.id !== "register-form") return;
        const msg = document.getElementById("register-msg");
        if (e.detail.xhr.status === 201) {
            msg.innerText = "Registration successful! Redirecting to login...";
            setTimeout(() => window.location.href = "/auth/login", 800);
        } else {
            try {
                msg.innerText = JSON.parse(e.detail.xhr.response).detail || "Registration failed.";
            } catch {
                msg.innerText = "Registration failed.";
            }
        }
    });
</script>
{% endblock %}
