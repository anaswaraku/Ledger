{% extends "base.html" %}
{% set auth_page = true %}

{% block title %}Register — Ledger{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-xl shadow-lg border border-gray-100">
        <div>
            <h2 class="mt-2 text-center text-3xl font-extrabold text-gray-900">Register</h2>
            <p class="mt-2 text-center text-sm text-gray-600">Create a new ledger account.</p>
        </div>
        
        <form id="register-form" hx-post="/api/v1/auth/register" hx-ext="json-enc" class="mt-8 space-y-6">
            <div class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                    <div class="mt-1">
                        <input id="email" name="email" type="email" autocomplete="email" required
                            class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-brand focus:border-brand sm:text-sm transition-colors">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                    <div class="mt-1">
                        <input id="password" name="password" type="password" autocomplete="new-password" required
                            class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-brand focus:border-brand sm:text-sm transition-colors">
                    </div>
                </div>
            </div>

            <div>
                <button type="submit"
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-brand hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand transition-colors">
                    Register
                </button>
            </div>
            <div id="register-msg" class="text-sm font-medium text-center"></div>
        </form>

        <div class="flex items-center justify-between mt-6 text-sm">
            <a href="/auth/login" class="font-medium text-brand hover:text-gray-600">Already have an account?</a>
            <a href="/" class="font-medium text-gray-500 hover:text-gray-900">Back to Home</a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.body.addEventListener("htmx:afterRequest", function (e) {
        if (e.detail.elt.id !== "register-form") return;
        const msg = document.getElementById("register-msg");
        if (e.detail.xhr.status === 201) {
            msg.innerHTML = '<span class="text-green-600">Registration successful! Redirecting...</span>';
            setTimeout(() => window.location.href = "/auth/login", 800);
        } else {
            try {
                const detail = JSON.parse(e.detail.xhr.response).detail;
                msg.innerHTML = `<span class="text-red-600">${detail || "Registration failed."}</span>`;
            } catch {
                msg.innerHTML = '<span class="text-red-600">Registration failed.</span>';
            }
        }
    });
</script>
{% endblock %}
