{% extends "base.html" %}

{% set auth_page = false %}
{% block title %}Accounts — Ledger{% endblock %}

{% block content %}
<div class="mb-8 flex items-center justify-between">
    <h2 class="text-2xl font-bold text-gray-900 tracking-tight">Accounts</h2>
</div>



<section id="accounts-section" style="display:none" class="space-y-8">
    
    <!-- Create Account Form -->
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
        <h3 class="text-lg font-medium text-gray-900 mb-4">Create New Account</h3>
        <form id="create-account-form" class="space-y-4">
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label for="acc-name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                    <input type="text" id="acc-name" name="name" required
                        class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand transition-colors">
                </div>

                <div>
                    <label for="acc-type" class="block text-sm font-medium text-gray-700 mb-1">Type</label>
                    <select id="acc-type" name="account_type"
                        class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand transition-colors bg-white">
                        <option value="ASSET">Asset</option>
                        <option value="LIABILITY">Liability</option>
                        <option value="EQUITY">Equity</option>
                        <option value="INCOME">Income</option>
                        <option value="EXPENSE">Expense</option>
                    </select>
                </div>
            </div>

            <button type="submit"
                class="inline-flex justify-center rounded-md bg-brand px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-gray-800 focus:outline-none transition-colors">
                Add Account
            </button>
        </form>
        <div id="account-msg" class="mt-4 text-sm font-medium"></div>
    </div>

    <!-- Accounts List -->
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
        <div class="px-6 py-5 border-b border-gray-200 bg-gray-50">
            <h3 class="text-lg font-medium text-gray-900 leading-6">Accounts</h3>
        </div>
        <div id="account-list" class="p-0">
            <div class="p-6 text-center text-sm text-gray-500">Loading...</div>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
    let selectedJournalId = null;

    function fetchJson(url, opts = {}) {
        const token = localStorage.getItem("access_token");
        return fetch(url, {
            ...opts,
            headers: {
                "Content-Type": "application/json",
                "Authorization": token ? "Bearer " + token : "",
                ...(opts.headers || {})
            }
        }).then(r => {
            if (r.status === 401) { localStorage.removeItem("access_token"); window.location.href = "/auth/login"; }
            return r.json();
        });
    }

    document.addEventListener("DOMContentLoaded", () => {
        const jid = localStorage.getItem("selectedJournalId");
        if (jid) {
            selectedJournalId = jid;
            document.getElementById("accounts-section").style.display = "block";
            loadAccounts();
        } else {
            const el = document.getElementById("account-list");
            el.innerHTML = "<div class='p-6 text-center text-sm text-gray-500'>Please select a journal from the sidebar.</div>";
        }
    });

    function loadAccounts() {
        const el = document.getElementById("account-list");
        el.innerHTML = '<div class="flex items-center justify-center py-8"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-brand"></div></div>';
        fetchJson("/api/v1/accounts/?journal_id=" + selectedJournalId).then(renderAccountList);
    }

    function renderAccountList(accounts) {
        const el = document.getElementById("account-list");
        if (accounts.length === 0) { 
            el.innerHTML = "<div class='p-6 text-center text-sm text-gray-500'>No accounts yet. Create one above.</div>"; 
            return; 
        }
        
        const typeColors = {
            'ASSET': 'bg-green-100 text-green-800',
            'LIABILITY': 'bg-red-100 text-red-800',
            'EQUITY': 'bg-purple-100 text-purple-800',
            'INCOME': 'bg-blue-100 text-blue-800',
            'EXPENSE': 'bg-yellow-100 text-yellow-800'
        };

        const tableHTML = `
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-300">
                    <thead>
                        <tr>
                            <th scope="col" class="py-3.5 pl-6 pr-3 text-left text-sm font-semibold text-gray-900">Name</th>
                            <th scope="col" class="px-3 py-3.5 text-left text-sm font-semibold text-gray-900">Type</th>
                            <th scope="col" class="px-3 py-3.5 text-left text-sm font-semibold text-gray-900">Created</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200 bg-white">
                        ${accounts.map(a => {
                            const badgeColor = typeColors[a.account_type] || 'bg-gray-100 text-gray-800';
                            return `
                            <tr class="hover:bg-gray-50 transition-colors">
                                <td class="whitespace-nowrap py-4 pl-6 pr-3 text-sm font-medium text-gray-900">${a.name}</td>
                                <td class="whitespace-nowrap px-3 py-4 text-sm text-gray-500">
                                    <span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-medium ${badgeColor}">
                                        ${a.account_type}
                                    </span>
                                </td>
                                <td class="whitespace-nowrap px-3 py-4 text-sm text-gray-500">${new Date(a.created_at).toLocaleDateString()}</td>
                            </tr>`;
                        }).join("")}
                    </tbody>
                </table>
            </div>`;
        el.innerHTML = tableHTML;
    }

    document.getElementById("create-account-form").addEventListener("submit", function (e) {
        e.preventDefault();
        const msg = document.getElementById("account-msg");
        const body = {
            journal_id: selectedJournalId,
            name: document.getElementById("acc-name").value,
            account_type: document.getElementById("acc-type").value,
        };
        fetchJson("/api/v1/accounts/", { method: "POST", body: JSON.stringify(body) }).then(data => {
            if (data.id) {
                msg.innerHTML = `<span class="text-green-600">Account '${data.name}' created successfully.</span>`;
                e.target.reset();
                loadAccounts();
            } else {
                const err = data.detail || JSON.stringify(data);
                msg.innerHTML = `<span class="text-red-600">${err}</span>`;
            }
        });
    });
</script>
{% endblock %}
